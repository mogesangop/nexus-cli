name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CGO_ENABLED: '0'
  GOPROXY: https://proxy.golang.org,direct

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and verify
        run: bash scripts/build.sh "${GITHUB_REF_NAME}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/nexus-cli-linux-amd64
            dist/nexus-cli-linux-amd64.sha256
            dist/nexus-cli-linux-arm64
            dist/nexus-cli-linux-arm64.sha256
