name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CGO_ENABLED: '0'
  GOPROXY: https://proxy.golang.org,direct

jobs:
  build:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build and verify
        run: bash scripts/build.sh "${GITHUB_REF_NAME}"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/nexus-cli-linux-x64.tar.gz
            dist/nexus-cli-linux-x64.tar.gz.sha256
            dist/nexus-cli-linux-arm64.tar.gz
            dist/nexus-cli-linux-arm64.tar.gz.sha256
            dist/nexus-cli-darwin-x64.tar.gz
            dist/nexus-cli-darwin-x64.tar.gz.sha256
            dist/nexus-cli-darwin-arm64.tar.gz
            dist/nexus-cli-darwin-arm64.tar.gz.sha256
            dist/nexus-cli-win32-x64.zip
            dist/nexus-cli-win32-x64.zip.sha256
            dist/nexus-cli-win32-arm64.zip
            dist/nexus-cli-win32-arm64.zip.sha256

  npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set version from tag
        run: npm --no-git-tag-version version "${GITHUB_REF_NAME#v}"
        working-directory: packaging/npm

      - name: Publish
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPMJS_TOKEN secret is empty or not configured"
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          npm whoami
          npm publish --access public --ignore-scripts
        working-directory: packaging/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_TOKEN }}

  yum:
    name: Build RPMs and update yum repo
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rpm createrepo-c
          sudo gem install fpm --no-document

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Extract linux binaries
        run: |
          tar -xzf dist/nexus-cli-linux-x64.tar.gz -C dist/
          mv dist/nexus-cli dist/nexus-cli-linux-x64
          tar -xzf dist/nexus-cli-linux-arm64.tar.gz -C dist/
          mv dist/nexus-cli dist/nexus-cli-linux-arm64

      - name: Build signed RPMs and repo
        run: bash scripts/build-rpm.sh "${GITHUB_REF_NAME}" dist/nexus-cli-linux-x64 dist/nexus-cli-linux-arm64
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
        continue-on-error: true

      - name: Stage yum repo
        run: |
          mkdir -p site/rpm
          cp dist/nexus-cli-*.rpm site/rpm/
          cp dist/RPM-GPG-KEY-nexus-cli site/
          cp packaging/rpm/nexus-cli.repo site/
          createrepo site/rpm

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
